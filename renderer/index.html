<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>自动办公助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title">自动办公助手</div>
          <div class="brand-sub muted">Midscene · Chrome 扩展</div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-route="overview">总览</button>
          <button class="nav-item" data-route="tasks">任务 <span class="badge" id="taskCountBadge"></span></button>
          <button class="nav-item" data-route="runs">执行记录</button>
          <button class="nav-item" data-route="alerts">告警中心 <span class="badge warn" id="alertBadge"></span></button>
          <button class="nav-item" data-route="settings">设置</button>
        </nav>
        <div class="footer muted">
          <div id="sideTime"></div>
        </div>
      </aside>

      <main class="content" id="content">
        <!-- 动态渲染 -->
      </main>
    </div>

    <div class="modal hidden" id="modal">
      <div class="modal-box" id="modalBox">
        <!-- 动态渲染 -->
      </div>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
